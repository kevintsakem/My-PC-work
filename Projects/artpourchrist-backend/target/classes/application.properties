# Server
server.port=3001

# Application name
spring.application.name=artpourchrist-backend

# ==============================
# DATABASE (H2 for development)
# ==============================
spring.datasource.url=jdbc:h2:mem:artpourchrist
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# PRODUCTION PostgreSQL (uncomment to switch)
# ==============================
# spring.datasource.url=jdbc:postgresql://localhost:5432/artpourchrist
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=your_user
# spring.datasource.password=your_password
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==============================
# JWT
# ==============================
jwt.secret=artpourchristSuperSecretKey2024ChangeInProduction!!!
jwt.expiration=86400000

# ==============================
# FILE UPLOAD
# ==============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Upload directory (relative to project root)
app.upload.dir=uploads
app.base-url=http://localhost:3001

# ==============================
# CORS (adjust for your frontend URL)
# ==============================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:8082,http://localhost:8080
# ==============================
# ADMIN DEFAULT CREDENTIALS
# ==============================
app.admin.email=admin@artpourchrist.com
app.admin.password=Admin@1234
