# ================================================================
# PROFIL PRODUCTION — activer avec : SPRING_PROFILES_ACTIVE=prod
# Toutes les variables ${VAR} sont OBLIGATOIRES en production
# ================================================================

# ==============================
# DATABASE — PostgreSQL
# ==============================
# Format : jdbc:postgresql://HOST:PORT/DATABASE
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Pool de connexions HikariCP
# Garantit le bon fonctionnement peu importe le nombre d'utilisateurs
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ==============================
# H2 — DÉSACTIVÉ EN PRODUCTION
# ==============================
spring.h2.console.enabled=false

# ==============================
# JWT
# ==============================
jwt.secret=${JWT_SECRET}
# 1 heure en production (plus sécurisé que 24h)
jwt.expiration=${JWT_EXPIRATION:3600000}

# ==============================
# FILE UPLOAD
# ==============================
# /tmp/uploads fonctionne sur Railway/Render
# Pour du multi-instance, utiliser Cloudinary ou S3
app.upload.dir=${UPLOAD_DIR:/tmp/uploads}
app.base-url=${BASE_URL}

# ==============================
# CORS — URL de ton frontend Vercel
# ==============================
app.cors.allowed-origins=${CORS_ORIGINS}

# ==============================
# ADMIN PAR DÉFAUT
# ==============================
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}

# ==============================
# LOGGING — réduit en production
# ==============================
logging.level.root=WARN
logging.level.com.artpourchrist=INFO
logging.level.org.springframework.security=WARN
